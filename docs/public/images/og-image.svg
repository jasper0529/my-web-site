<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F19"/>
      <stop offset="50%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:0.15"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 装饰光晕 -->
  <circle cx="200" cy="150" r="180" fill="#2563EB" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="1000" cy="450" r="200" fill="#F97316" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="600" cy="300" r="250" fill="url(#glow)" filter="url(#blur1)"/>

  <!-- 网格装饰线 -->
  <g stroke="#2563EB" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- 左侧装饰 - 代码符号 -->
  <text x="80" y="200" font-family="monospace" font-size="48" fill="#3B82F6" opacity="0.15">{</text>
  <text x="1100" y="450" font-family="monospace" font-size="48" fill="#F97316" opacity="0.15">}</text>
  <text x="950" y="180" font-family="monospace" font-size="36" fill="#60A5FA" opacity="0.1"></></text>
  <text x="100" y="480" font-family="monospace" font-size="32" fill="#34D399" opacity="0.1">def</text>

  <!-- 主标题 -->
  <text x="600" y="245" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">
    Jasper Labs
  </text>

  <!-- 渐变下划线 -->
  <rect x="380" y="265" width="440" height="4" rx="2" fill="url(#accent)"/>

  <!-- 副标题 -->
  <text x="600" y="320" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="#94A3B8" letter-spacing="1">
    个人技术知识库与博客
  </text>

  <!-- 标签行 -->
  <g transform="translate(600, 380)" text-anchor="middle">
    <rect x="-310" y="-16" width="120" height="32" rx="16" fill="rgba(37,99,235,0.15)" stroke="rgba(37,99,235,0.3)" stroke-width="1"/>
    <text x="-250" y="6" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#60A5FA">🐍 Python</text>

    <rect x="-170" y="-16" width="120" height="32" rx="16" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
    <text x="-110" y="6" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#34D399">🤖 AI</text>

    <rect x="-30" y="-16" width="120" height="32" rx="16" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
    <text x="30" y="6" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#FB923C">📊 算法</text>

    <rect x="110" y="-16" width="120" height="32" rx="16" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
    <text x="170" y="6" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#A78BFA">📝 笔记</text>
  </g>

  <!-- 底部网址 -->
  <text x="600" y="560" text-anchor="middle" font-family="monospace" font-size="18" fill="#475569" letter-spacing="2">
    https://jasper-labs.cn
  </text>

  <!-- 底部渐变线 -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#accent)"/>
</svg>
