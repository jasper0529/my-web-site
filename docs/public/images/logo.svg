<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 书本形状 -->
  <path d="M15 20 L50 10 L50 80 L15 90 Z" fill="url(#logoGradient)" opacity="0.95"/>
  <path d="M85 20 L50 10 L50 80 L85 90 Z" fill="url(#logoGradient)" opacity="0.75"/>
  <!-- 页面线条 -->
  <line x1="22" y1="30" x2="43" y2="24" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="40" x2="43" y2="34" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="50" x2="43" y2="44" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="78" y1="30" x2="57" y2="24" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="78" y1="40" x2="57" y2="34" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="78" y1="50" x2="57" y2="44" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- 中心光点 -->
  <circle cx="50" cy="50" r="3" fill="white" opacity="0.9"/>
</svg>
