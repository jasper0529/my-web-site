<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <!-- 主渐变：深蓝 → 蓝紫 -->
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>

    <!-- 书页渐变：稍浅的蓝 → 深蓝 -->
    <linearGradient id="pageGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>

    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2563EB" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景装饰圆 -->
  <circle cx="200" cy="150" r="120" fill="url(#heroGradient)" opacity="0.08"/>
  <circle cx="200" cy="150" r="90"  fill="url(#heroGradient)" opacity="0.06"/>
  <circle cx="200" cy="150" r="60"  fill="url(#heroGradient)" opacity="0.04"/>

  <!-- 书本主体 - 左页 -->
  <g filter="url(#shadow)">
    <path d="M120 60 L200 40 L200 240 L120 260 Z" fill="url(#pageGradient)" opacity="0.95"/>

    <!-- 书本主体 - 右页 -->
    <path d="M280 60 L200 40 L200 240 L280 260 Z" fill="url(#heroGradient)" opacity="0.8"/>
  </g>

  <!-- 书脊 -->
  <line x1="200" y1="40" x2="200" y2="240" stroke="#1E40AF" stroke-width="3" opacity="0.6"/>

  <!-- 左页线条 -->
  <line x1="140" y1="90"  x2="180" y2="80"  stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="140" y1="110" x2="180" y2="100" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="140" y1="130" x2="180" y2="120" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="140" y1="150" x2="180" y2="140" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="140" y1="170" x2="180" y2="160" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- 右页线条 -->
  <line x1="220" y1="80"  x2="260" y2="90"  stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="220" y1="100" x2="260" y2="110" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="220" y1="120" x2="260" y2="130" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="220" y1="140" x2="260" y2="150" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="220" y1="160" x2="260" y2="170" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- 中心光点 -->
  <circle cx="200" cy="150" r="8"  fill="white" opacity="0.9"/>
  <circle cx="200" cy="150" r="16" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
  <circle cx="200" cy="150" r="26" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>

  <!-- 装饰元素 - 代码符号 -->
  <!-- 修复点：原来的 &lt; / &gt; 被写成实体，这里直接用 < / >，并转义为 &lt; / &gt; -->
  <text x="80" y="100" font-family="monospace" font-size="18" fill="#2563EB" opacity="0.4">&lt;/&gt;</text>
  <text x="300" y="200" font-family="monospace" font-size="18" fill="#2563EB" opacity="0.4">{...}</text>
  <text x="90" y="220" font-family="monospace" font-size="14" fill="#2563EB" opacity="0.3">#</text>
  <text x="290" y="90" font-family="monospace" font-size="14" fill="#2563EB" opacity="0.3">@</text>
</svg>
